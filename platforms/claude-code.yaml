name: OpenMobius-skill
description: ICT/SMC trading knowledge base (380 concepts + 584 cases distilled from 130 teaching videos) + real-time Kline data + indicator queries + chart generation via Mobius Quant API. Four interaction modes - (1) concept Q&A when user asks "what is X / how to identify Y / how to enter Z" without a chart; (2) chart analysis when user attaches a trading chart image AND asks anything about it (analysis / patterns / entry / setup / bias / structure / "看图" / "分析" / "走势" / "行情" / "帮我看") — auto-fetches real OHLCV for precise prices; (3) chart annotation when user explicitly wants visual markup ("draw / annotate / mark / highlight / 标一下 / 画出来 / 标注 / 在图上标"); (4) Kline data analysis when user pastes OHLCV data OR gives just asset+timeframe ("BTC 1h 怎么样" / "茅台日线" / pastes CSV/JSON). Also supports tech indicator queries (RSI/MACD/EMA/Bollinger/ATR/etc.) with Mobius's built-in analysis dimensions. ALWAYS use this skill for any ICT/SMC question, trading-chart image, or asset-by-name query — DO NOT answer from training data alone. Covers Order Block, Fair Value Gap, Liquidity Sweep, Killzone, CISD, Premium/Discount Array, OTE, Breaker Block, IFVG, Inducement, Market Structure Shift, BOS, CHoCH, Displacement, V-Shape Reversal, Turtle Soup and 360+ more ICT terms. Supports crypto (binance/bybit/okx/hyperliquid), A股/港股/美股 and forex.
allowed-tools: Bash, Read, Write, Edit, Glob, Grep
