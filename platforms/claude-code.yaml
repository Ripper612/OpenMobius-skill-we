name: OpenMobius-skill
description: ICT/SMC trading knowledge base (380 concepts + 584 cases) + real-time Kline data + indicator queries + chart generation via Mobius Quant API. Four interaction modes - (1) concept Q&A when user asks "what is X / how to identify Y / how to enter Z" without a chart; (2) chart analysis when user attaches a trading chart image AND asks anything about it (analysis / patterns / entry / setup / bias / structure / "看图" / "分析" / "走势" / "行情" / "帮我看") — auto-fetches real OHLCV for precise prices; (3) chart annotation when user explicitly wants visual markup ("draw / annotate / mark / highlight / 标一下 / 画出来 / 标注 / 在图上标"); (4) Kline data analysis when user pastes OHLCV data OR gives just asset+timeframe ("BTC 1h 怎么样" / "茅台日线" / pastes CSV/JSON). Also supports tech indicator queries (RSI/MACD/EMA/Bollinger/ATR/etc.). Supports crypto, A股/港股/美股 and forex.
allowed-tools: Bash, Read, Write, Edit, Glob, Grep
