name: OpenMobius-skill
description: ICT/SMC trading knowledge base (380 concepts + 584 cases) + Mobius Quant API integration for live K-line, technical indicators (RSI/MACD/EMA/Bollinger/ATR/etc. with built-in analysis dimensions), and chart generation. Four interaction modes - (1) concept Q&A ("什么是 FVG / how to identify OB"); (2) chart image analysis with auto-fetched OHLCV; (3) chart annotation (markup on user-uploaded images); (4) pasted-OHLCV or asset-by-name analysis ("BTC 1h 怎么样" / paste CSV). Use this skill for any ICT/SMC question, trading-chart image, technical indicator query, or asset-by-name analysis. Supports crypto (Binance/Bybit/OKX/Hyperliquid), A股/港股/美股, and forex.
