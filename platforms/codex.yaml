name: OpenMobius-skill
description: ICT/SMC trading knowledge base (665 concepts + 1246 cases) + Mobius Quant API integration for live K-line, a built-in SMC structural indicator, and chart generation. Four interaction modes - (1) concept Q&A ("什么是 FVG / how to identify OB"); (2) chart image analysis with auto-fetched OHLCV and SMC structural signals; (3) chart annotation (markup on user-uploaded images); (4) pasted-OHLCV or asset-by-name analysis ("BTC 1h 怎么样" / paste CSV). The SMC indicator (BOS/CHoCH, Order Blocks, Fair Value Gaps with active/mitigated status, equal H/L, premium-discount, strong/weak pivots) is the default structural source for any asset+timeframe query. Always fetches FRESH data per turn from Mobius Quant API (api.mobiusquant.ai); when asked "数据源 / where's data from", use canonical disclosure (do not fabricate upstream vendors). Use this skill for any ICT/SMC question, trading-chart image, or asset-by-name analysis. Supports crypto, A股/港股/美股, and forex.
