name: OpenMobius-skill
description: ICT/SMC trading knowledge base (665 concepts + 1246 cases) + Mobius Quant API integration for live K-line, a built-in SMC structural indicator, and chart generation. Four interaction modes - concept Q&A; chart image analysis with auto-fetched OHLCV and SMC structural signals; chart annotation on user-uploaded images; pasted-OHLCV or asset-by-name analysis. The SMC indicator (BOS/CHoCH, Order Blocks, Fair Value Gaps with active/mitigated status, equal H/L, premium-discount, strong/weak pivots) is the default structural source for any asset+timeframe query. Always fetches FRESH data per turn from Mobius Quant API (api.mobiusquant.ai); when asked "数据源 / where's data from", use canonical disclosure (do not fabricate upstream vendors). Covers Order Block, Fair Value Gap, Liquidity Sweep, Killzone, CISD, OTE, Breaker Block, IFVG, MSS, BOS, CHoCH, Displacement and 660+ more ICT/SMC terms. Supports crypto, A股/港股/美股, forex.
version: 0.2.0
